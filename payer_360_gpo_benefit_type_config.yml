cubes:
- name: payer_360_gpo_benefit_type_config
  sql_table: '"oasis-dev-cube-poc".payer_360_gpo_benefit_type_config'
  data_source: default
  public: false
  refresh_key:
    every: 5 minute
  dimensions:
  - name: benefit_type
    sql: benefit_type
    type: string
    primary_key: true
    description: This field tells the benefit type by Manish
    meta:
      owner: Annant
      use_cases: Tells the benefit
      kpi: true
    title: Benefit Type
  - name: gpo_name
    sql: gpo_name
    type: string
    description: This field tells the  gpo name by Manish
    meta:
      calculation_logic: COALESCE(rx_lives, mx_lives) - Uses RX lives if available,
        otherwise falls back to MX lives
    title: Name of Gpo
  measures:
  - name: count
    type: count
    meta:
      owner: Manish
      domain: Gpo_claims
    title: Total Count
    description: This field tells the count of the rows
    format: number
