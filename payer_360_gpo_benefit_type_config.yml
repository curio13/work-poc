  data_source: default
  public: false
  refresh_key:
    every: 5 minute
  dimensions:
  - name: benefit_type
    sql: benefit_type
    type: string

  - name: gpo_name
    sql: gpo_name
    type: string

  measures:
  - name: count
    type: count
